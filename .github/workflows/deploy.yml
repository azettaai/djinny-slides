name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Re-encrypt if the DECKPASSWORD secret is configured.
      # If not set, the committed docs/encrypted/ blobs are used as-is.
      - name: Re-encrypt slides
        if: ${{ secrets.DECKPASSWORD != '' }}
        env:
          DECKPASSWORD: ${{ secrets.DECKPASSWORD }}
        run: |
          pip install cryptography
          python3 encrypt.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
