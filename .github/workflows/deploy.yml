name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encrypt slides
        env:
          DECKPASSWORD: ${{ secrets.DECKPASSWORD }}
        run: |
          if [ -n "$DECKPASSWORD" ]; then
            echo "DECKPASSWORD secret found — re-encrypting slides."
            pip install -r requirements.txt --quiet
            python3 encrypt.py
          else
            echo "DECKPASSWORD not configured — using committed docs/encrypted/ blobs."
            if [ ! -f docs/encrypted/client.enc.json ] || [ ! -f docs/encrypted/pitch.enc.json ]; then
              echo "::error::docs/encrypted/ blobs are missing and DECKPASSWORD secret is not set."
              echo "::error::Either set the DECKPASSWORD repository secret or commit pre-generated blobs."
              exit 1
            fi
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
